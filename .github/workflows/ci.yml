name: CI - Validacion de Codigo

on:
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Lint y Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint